name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - name: Check tag matches CLI version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CLI_VERSION="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG_VERSION" != "$CLI_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match packages/cli version $CLI_VERSION" >&2
            exit 1
          fi

      - name: Publish @codesema/contract
        working-directory: packages/contract
        run: |
          LOCAL="$(node -p "require('./package.json').version")"
          PUBLISHED="$(npm view @codesema/contract version || echo none)"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "@codesema/contract@$LOCAL already published, skipping"
            exit 0
          fi
          case "$LOCAL" in
            *-beta*|*-rc*|*-alpha*) DIST_TAG=next ;;
            *) DIST_TAG=latest ;;
          esac
          npm publish --tag "$DIST_TAG"

      - name: Publish codesema
        working-directory: packages/cli
        run: |
          LOCAL="$(node -p "require('./package.json').version")"
          PUBLISHED="$(npm view codesema version || echo none)"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "codesema@$LOCAL already published, skipping"
            exit 0
          fi
          case "$LOCAL" in
            *-beta*|*-rc*|*-alpha*) DIST_TAG=next ;;
            *) DIST_TAG=latest ;;
          esac
          npm publish --tag "$DIST_TAG"
